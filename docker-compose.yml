services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: proactive_its
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proactive_its"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.16.3
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  bootstrap:
    build: .
    environment:
      BOOK_JSON_PATH: data/book.json
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/proactive_its
    command: ["python", "scripts/bootstrap_runtime.py"]
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/proactive_its
      EMBEDDING_BASE_URL: http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      qdrant:
        condition: service_started

volumes:
  postgres_data:
    name: proactive_its_postgres_data
  qdrant_storage:
    name: proactive_its_qdrant_storage
