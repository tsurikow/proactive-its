x-app-env: &app-env
  APP_HOST: ${APP_HOST:-0.0.0.0}
  APP_PORT: ${APP_PORT:-8000}
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-change-me-postgres-password}@postgres:${POSTGRES_INTERNAL_PORT:-5432}/${POSTGRES_DB:-proactive_its}
  QDRANT_URL: http://qdrant:${QDRANT_INTERNAL_PORT:-6333}
  RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-proactive}:${RABBITMQ_DEFAULT_PASS:-change-me-rabbitmq-password}@rabbitmq:${RABBITMQ_INTERNAL_PORT:-5672}//
  REDIS_URL: redis://redis:6379/0

x-data-volume: &data-volume
  type: bind
  source: ./data
  target: /app/data
  read_only: true

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-proactive_its}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-proactive_its}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.16.3
    expose:
      - "${QDRANT_INTERNAL_PORT:-6333}"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':>/dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-proactive}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change-me-rabbitmq-password}
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    expose:
      - "${RABBITMQ_INTERNAL_PORT:-5672}"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  bootstrap:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      <<: *app-env
    command: ["/app/.venv/bin/python", "-m", "scripts.bootstrap_runtime"]
    volumes:
      - *data-volume
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  indexer:
    profiles: ["ops"]
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      <<: *app-env
    command:
      [
        "/app/.venv/bin/python",
        "-m",
        "scripts.index_content",
        "--documents",
        "${DOCUMENTS_JSON_PATH:-data/documents.jsonl}",
      ]
    volumes:
      - *data-volume
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      <<: *app-env
    expose:
      - "${APP_PORT:-8000}"
    volumes:
      - *data-volume
    deploy:
      resources:
        limits:
          memory: 1G
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          memory: 1G
    env_file:
      - .env
    command:
      [
        "/app/.venv/bin/celery",
        "-A",
        "app.platform.chat.tasks:celery_app",
        "worker",
        "--loglevel=INFO",
        "-Q",
        "${CHAT_WORKER_QUEUE:-chat_generation}",
      ]
    environment:
      <<: *app-env
      CHAT_WORKER_QUEUE: ${CHAT_WORKER_QUEUE:-chat_generation}
    volumes:
      - *data-volume
    depends_on:
      bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/v1}
        VITE_REQUEST_TIMEOUT_MS: ${VITE_REQUEST_TIMEOUT_MS:-90000}
        VITE_AUTH_RESET_ENABLED: ${VITE_AUTH_RESET_ENABLED:-true}
    ports:
      - "${WEB_PUBLISH_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-proactive_its_postgres_data}
  qdrant_storage:
    name: ${QDRANT_VOLUME_NAME:-proactive_its_qdrant_storage}
