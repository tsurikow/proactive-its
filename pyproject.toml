[project]
name = "proactive-its"
version = "0.1.0"
description = "Baseline tutoring system with deterministic study flow and RAG"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.30.0",
  "pydantic>=2.8.0",
  "pydantic-settings>=2.3.0",
  "alembic>=1.14.0",
  "sqlalchemy>=2.0.37",
  "asyncpg>=0.30.0",
  "qdrant-client>=1.11.0",
  "openai>=1.40.0",
  "langchain-core>=0.3.30",
  "langchain-openai>=0.2.10",
  "langchain-qdrant>=0.2.0",
  "httpx>=0.27.0",
  "python-dotenv>=1.0.1",
]

[project.optional-dependencies]
dev = [
  "ruff>=0.6.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["app*"]
exclude = ["data*", "tests*", "scripts*"]
